function calcMonthlyPivot(historyPoints) {
  const clean = Array.isArray(historyPoints)
    ? historyPoints.filter((p) => p && Number.isFinite(p.timestamp) && Number.isFinite(p.price) && p.price > 0)
    : [];
  if (clean.length < 30) return null;
  const latestDate = new Date(clean[clean.length - 1].timestamp);
  const currentMonthStart = Date.UTC(latestDate.getUTCFullYear(), latestDate.getUTCMonth(), 1);
  const previousMonthStart = Date.UTC(latestDate.getUTCFullYear(), latestDate.getUTCMonth() - 1, 1);
  const previousMonth = clean.filter((p) => p.timestamp >= previousMonthStart && p.timestamp < currentMonthStart);
  if (previousMonth.length < 3) return null;
  const high = Math.max(...previousMonth.map((p) => p.price));
  const low = Math.min(...previousMonth.map((p) => p.price));
  const close = previousMonth[previousMonth.length - 1].price;
  return (high + low + close) / 3;
}

  else if (price < YEARLY_PIVOTS.R2) s = 25;          // Trim / premium zone

  }

  return Math.max(0, Math.min(100, Math.round(s)));
}

// ─── STATISTICAL OVERSOLD ENGINE ─────────────────────────────────────────────

function calcMean(values) {
  return values.reduce((a, b) => a + b, 0) / values.length;
}

function calcStd(values, mean) {
  const variance = values.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / values.length;
  return Math.sqrt(variance);
}

function calcZScore(prices, lookback = 30) {
  const clean = prices.filter((v) => Number.isFinite(v) && v > 0);
  if (clean.length < lookback) return null;

  const slice = clean.slice(-lookback);
  const mean = calcMean(slice);
  const std = calcStd(slice, mean);
  const last = clean[clean.length - 1];

  return std === 0 ? 0 : (last - mean) / std;
}

function calcBollingerPercentB(prices, lookback = 20, multiplier = 2) {
  const clean = prices.filter((v) => Number.isFinite(v) && v > 0);
  if (clean.length < lookback) return null;

  const slice = clean.slice(-lookback);
  const mean = calcMean(slice);
  const std = calcStd(slice, mean);
  const upper = mean + multiplier * std;
  const lower = mean - multiplier * std;
  const last = clean[clean.length - 1];

  return upper === lower ? 0.5 : (last - lower) / (upper - lower);
}

function getStatState(zScore, percentB) {
  if (zScore === null || percentB === null) return "NEUTRAL";
  if (zScore < -1.5 && percentB < 0.2) return "OVERSOLD";
  if (zScore > 1.5 && percentB > 0.8) return "OVERBOUGHT";
  return "NEUTRAL";
}

async function fetchJsonWithTimeout(url, timeoutMs = 5000) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(url, { signal: controller.signal, cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } finally {
    clearTimeout(timeout);
  }
}

async function fetchCoinGeckoPrice(config) {
  const id  = encodeURIComponent(config.coingeckoId);
  const key = encodeURIComponent(CG_DEMO_API_KEY);
  const url =
    `https://api.coingecko.com/api/v3/simple/price?ids=${id}&vs_currencies=usd` +
    `&include_last_updated_at=true&x_cg_demo_api_key=${key}&_=${Date.now()}`;

  const data  = await fetchJsonWithTimeout(url, 3500);
  const price = data && data[config.coingeckoId] && data[config.coingeckoId].usd;
  if (!Number.isFinite(price) || price <= 0) throw new Error("Invalid CoinGecko price");
  return { price, source: "CoinGecko Demo API" };
}

async function fetchCoinGeckoHistory(config) {
  const id  = encodeURIComponent(config.historyCoingeckoId || config.coingeckoId);

    `&x_cg_demo_api_key=${key}&_=${Date.now()}`;

  const data = await fetchJsonWithTimeout(url, 7000);
  const historyPoints = (data && data.prices ? data.prices : [])
    .map((point) => ({
      timestamp: Array.isArray(point) ? Number(point[0]) : NaN,
      price: Array.isArray(point) ? Number(point[1]) : NaN,
    }))
    .filter((point) => Number.isFinite(point.timestamp) && Number.isFinite(point.price) && point.price > 0);

  if (historyPoints.length < 30) throw new Error("Insufficient CoinGecko history");
  return {
    prices: historyPoints.map((point) => point.price),
    historyPoints,
  };
}

    render();

    const config = ASSET_CONFIG[state.assetKey];
    const live   = await fetchCoinGeckoPrice(config);

    state.price       = live.price;
    state.priceSource = live.source;
    state.feedStatus  = "LIVE";
    state.lastUpdated = Date.now();
    state.warning     = "";

    try {
      const history = await fetchCoinGeckoHistory(config);
      state.prices = history.prices;
      state.historyPoints = history.historyPoints;
    } catch (_) {
      // Keep cached/fallback history if historical endpoint is unavailable.
      state.prices.push(state.price);
      state.prices = state.prices.filter((v) => Number.isFinite(v) && v > 0).slice(-500);
      state.historyPoints.push({ timestamp: Date.now(), price: state.price });
      state.historyPoints = state.historyPoints
        .filter((p) => p && Number.isFinite(p.timestamp) && Number.isFinite(p.price) && p.price > 0)
        .slice(-500);
    }

    refreshIndicators();
    saveCache();
  } catch (err) {
    const usedCache = loadCache(state.assetKey);
    if (usedCache) {
      state.feedStatus = "CACHED";
      state.warning    = "CoinGecko Demo API unavailable. Showing cached last successful price.";
    } else {
      const config      = ASSET_CONFIG[state.assetKey];
      state.price       = config.fallbackPrice;
      state.priceSource = "Fallback";
      state.feedStatus  = "FALLBACK";
      state.warning     = "CoinGecko Demo API unavailable. Showing fallback price.";
      state.prices.push(state.price);
      state.prices = state.prices.filter((v) => Number.isFinite(v) && v > 0).slice(-500);
      state.historyPoints.push({ timestamp: Date.now(), price: state.price });
      state.historyPoints = state.historyPoints
        .filter((p) => p && Number.isFinite(p.timestamp) && Number.isFinite(p.price) && p.price > 0)
        .slice(-500);
    }
    refreshIndicators();
  } finally {
    render();
  }
}

function setAsset(assetKey) {
  if (!ASSET_CONFIG[assetKey]) return;
  state.assetKey          = assetKey;
  loadCache(assetKey);

  document.querySelectorAll(".asset-btn").forEach((btn) => {
    btn.classList.toggle("active", btn.dataset.asset === assetKey);
  });

  render();
  refreshPrice();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────

function render() {
  refreshIndicators();
  const zone       = getZone(state.price);
  const statState  = getStatState(state.zScore, state.percentB);
  const statBuy    = statState === "OVERSOLD";
  let signal       = statBuy ? "BUY" : getSignal(state.price);
  const confidence = getConfidence(state.price, state.zScore, state.percentB);
  const band       = getBand(confidence);
  const allocation = statBuy ? { core: 60, dry: 40 } : getAllocation(state.price);

  document.getElementById("feedLabel").textContent =
    `FEED ${state.feedStatus}${state.lastUpdated ? " " + new Date(state.lastUpdated).toLocaleTimeString() : ""}`;

  const warningBox = document.getElementById("warningBox");
  if (state.warning) {
    warningBox.textContent   = state.warning;
    warningBox.style.display = "block";
  } else {
    warningBox.textContent   = "";
    warningBox.style.display = "none";
  }

  document.getElementById("priceBox").textContent = `$${format(state.price)}`;
  const regimeBox = document.getElementById("regimeBox");
  regimeBox.textContent = zone;
  regimeBox.className   = toneClass(zone);

  document.getElementById("signalBox").textContent     = signal;
  document.getElementById("confidenceBox").textContent = `${confidence}/100`;
  document.getElementById("bandBox").textContent       = band;

  const monthlyPivotLevel = Number.isFinite(state.monthlyPivot) ? state.monthlyPivot : YEARLY_PIVOTS.P;
  document.getElementById("monthlyPivotLevelBox").textContent = `$${format(monthlyPivotLevel)}`;

  const monthlyPivotBox = document.getElementById("monthlyPivotBox");
  monthlyPivotBox.textContent = getMonthlyPivotState(state.price);
  monthlyPivotBox.className = monthlyPivotToneClass(state.price);

  document.getElementById("zScoreBox").textContent =
    state.zScore !== null ? state.zScore.toFixed(2) : "—";
  document.getElementById("percentBBox").textContent =
    state.percentB !== null ? state.percentB.toFixed(2) : "—";

  document.getElementById("pivotRows").innerHTML = Object.entries(YEARLY_PIVOTS)
    .map(([k, v]) => row(k, `$${format(v)}`)).join("");

  document.getElementById("stateRows").innerHTML = [
    row("ASSET",            ASSET_CONFIG[state.assetKey].label),
    row("REGIME",           zone),
    row("SIGNAL",           signal),
    row("1M PIVOT",         getMonthlyPivotState(state.price)),
    row("STAT STATE",       statState),
    row("Z-SCORE",          state.zScore !== null ? state.zScore.toFixed(2) : "—"),
    row("BOLLINGER %B",     state.percentB !== null ? state.percentB.toFixed(2) : "—"),
  ].join("");

  document.getElementById("allocationRows").innerHTML = [
    row("CORE",        `${allocation.core}%`),
    row("DRY POWDER",  `${allocation.dry}%`),
  ].join("");

  document.getElementById("executionRows").innerHTML = [
    row("TRIM",       `$${formatWhole(YEARLY_PIVOTS.R1)}`),
    row("FAIR VALUE", `$${formatWhole(YEARLY_PIVOTS.P)}`),
    row("ENTRY",  `$${formatWhole(YEARLY_PIVOTS.S1)}`),
  ].join("");
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────

document.querySelectorAll(".asset-btn").forEach((btn) => {
  btn.addEventListener("click", () => setAsset(btn.dataset.asset));
});

loadCache(state.assetKey);
refreshIndicators();
render();

// Fast first paint: show cached/fallback immediately, then fetch live in background.
setTimeout(refreshPrice, 1200);

// Auto-refresh every 2 minutes.
refreshTimer = setInterval(refreshPrice, 120000);
</script>
