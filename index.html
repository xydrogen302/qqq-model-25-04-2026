<title>Predictive Modeling Terminal</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {

    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-transform: uppercase;
  }
  button, input, select, textarea { text-transform: uppercase; }
  .app { max-width: 1440px; margin: 0 auto; padding: 24px 16px 40px; }
  .header { display: flex; flex-direction: column; justify-content: space-between; gap: 8px; margin-bottom: 24px; }
  .title {
    margin: 0;
    font-family: "Arial Black", Impact, Haettenschweiler, "Segoe UI Black", sans-serif;
    font-size: clamp(38px, 7vw, 78px);
    font-weight: 900;
    letter-spacing: -0.045em;
    line-height: 1.02;
  }
  .feed { font-size: 12px; color: rgba(255,255,255,0.50); align-self: flex-start; line-height: 1.25; }
  .asset-row { display: flex; gap: 8px; flex-wrap: wrap; margin: -12px 0 20px; }
  .asset-btn {
    background: #000000;
    color: rgba(255,255,255,0.55);
    border: 1px solid rgba(255,255,255,0.10);
    padding: 8px 12px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.4px;
    cursor: pointer;
  }
  .asset-btn.active { color: #ffffff; background: rgba(255,255,255,0.08); }
  .grid-top { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; margin-bottom: 24px; }
  .forecast-section { margin-bottom: 24px; }
  .section-title { font-size: 12px; color: rgba(255,255,255,0.40); letter-spacing: 0.35px; line-height: 1.25; margin-bottom: 12px; }
  .forecast-card-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
  .forecast-card { border: 1px solid rgba(255,255,255,0.10); padding: 16px; background: #000000; content-visibility: auto; contain-intrinsic-size: 90px; }
  .box { border: 1px solid rgba(255,255,255,0.10); padding: 16px; background: #000000; content-visibility: auto; contain-intrinsic-size: 120px; }
  .box-label { font-size: 12px; color: rgba(255,255,255,0.40); letter-spacing: 0.35px; line-height: 1.25; }
  .box-label { margin-bottom: 4px; }
  .box-value { font-size: 18px; line-height: 1.25; }
  .box-sub { font-size: 12px; color: rgba(255,255,255,0.50); margin-top: 2px; line-height: 1.25; }
  .tone { display: inline-block; padding: 2px 8px; border: 1px solid rgba(255,255,255,0.10); }
  .tone-expansion, .tone-bull { color: rgb(110, 231, 183); border-color: rgba(16,185,129,0.30); background: rgba(16,185,129,0.10); }
  .tone-balance { color: rgb(252, 211, 77); border-color: rgba(245,158,11,0.30); background: rgba(245,158,11,0.10); }
  .tone-transition, .tone-value, .tone-bear { color: rgb(248, 113, 113); border-color: rgba(239,68,68,0.30); background: rgba(239,68,68,0.10); }
  .tone-premium { color: rgb(196, 181, 253); border-color: rgba(139,92,246,0.35); background: rgba(139,92,246,0.12); }
  .row { display: block; font-size: 14px; padding: 9px 0; text-align: left; }
  .row-left { display: block; color: rgba(255,255,255,0.44); font-size: 14px; line-height: 1.25; letter-spacing: 0.35px; text-align: left; }
  .row-right { display: block; color: #ffffff; font-size: 14px; line-height: 1.35; margin-top: 3px; text-align: left; }
  .warn { border: 1px solid rgba(245,158,11,0.35); color: rgb(252, 211, 77); padding: 10px 12px; font-size: 12px; line-height: 1.25; margin-bottom: 16px; display: none; }
  .footnote { color: rgba(255,255,255,0.36); font-size: 11px; line-height: 1.45; margin-top: 20px; }
  @media (min-width: 640px) {
    .header { flex-direction: row; align-items: center; }
    .feed { align-self: center; padding-top: 0; }
  }
  @media (min-width: 768px) {
    .grid-top { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .forecast-card-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
</style>

function format(v) { return Number(v).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function cleanPrices(values) { return values.filter((v) => Number.isFinite(v) && v > 0); }
function toCapitalisedCase(value) {
  const preserve = new Set(["QQQ", "ETF", "CSV", "AUC", "Monte Carlo", "USD", "HTTP", "JSON", "API", "NASDAQ", "COINGECKO", "FEED", "LIVE", "R1", "R2", "R3", "R4", "R5", "S1", "S2", "S3", "S4", "S5", "1Y", "1M", "Z", "%B", "V1", "V1.3"]);
  return String(value).replace(/[A-Za-z%][A-Za-z0-9%]*/g, (word) => {
    const upper = word.toUpperCase();
    if (preserve.has(upper)) return upper;
    if (/^[A-Z0-9%]+$/.test(word) && word.length > 1) return word;
    return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
  });
}

function calcMean(values) { return values.reduce((a, b) => a + b, 0) / values.length; }
function calcStd(values, mean) {
  const variance = values.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / values.length;
  return Math.sqrt(variance);
}
function buildIndicatorPrices(prices, currentPrice) {
  const clean = cleanPrices(Array.isArray(prices) ? prices : []);
  if (!Number.isFinite(currentPrice) || currentPrice <= 0) return clean;

  const merged = clean.slice();
  merged[merged.length - 1] = currentPrice;
  return merged;
}
function calcZScore(prices, lookback = 30) {
  const clean = cleanPrices(prices);
  if (clean.length < lookback) return null;
  const slice = clean.slice(-lookback);
  const mean = calcMean(slice);
  const std = calcStd(slice, mean);
  const last = clean[clean.length - 1];
  return std === 0 ? 0 : (last - mean) / std;
}
function calcBollingerPercentB(prices, lookback = 20, multiplier = 2) {
  const clean = cleanPrices(prices);
  if (clean.length < lookback) return null;
  const slice = clean.slice(-lookback);
  const mean = calcMean(slice);
  const std = calcStd(slice, mean);
  const upper = mean + multiplier * std;

}
function calcMonthlyPivot(historyPoints) {
  const clean = Array.isArray(historyPoints)

  const latestDate = new Date(clean[clean.length - 1].timestamp);

function toneClass(zone) {
  if (zone === "FROTH" || zone === "CONVEXITY") return "tone tone-premium";
  if (zone === "BREAKOUT") return "tone tone-expansion";
  if (zone === "BALANCE") return "tone tone-balance";
  return "tone tone-value";
}
function monthlyPivotToneClass(price) { return getMonthlyPivotState(price) === "BULLISH" ? "tone tone-bull" : "tone tone-bear"; }
async function fetchJsonWithTimeout(url, timeoutMs = 5000) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(url, {
      signal: controller.signal,
      cache: "no-store",
      mode: "cors",
      headers: { "accept": "application/json" },
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } finally { clearTimeout(timeout); }
}
function buildCoinGeckoUrl(path, params = {}) {
  const url = new URL(`https://api.coingecko.com/api/v3/${path}`);
  Object.entries(params).forEach(([key, value]) => url.searchParams.set(key, value));
  url.searchParams.set("x_cg_demo_api_key", CG_DEMO_API_KEY);
  url.searchParams.set("_", String(Date.now()));
  return url.toString();
}
async function fetchCoinGeckoPrice(config) {
  const id = config.coingeckoId;
  const url = buildCoinGeckoUrl("simple/price", {
    ids: id,
    vs_currencies: "usd",
    include_last_updated_at: "true",
  });
  const data = await fetchJsonWithTimeout(url, 8000);
  const price = data && data[id] && Number(data[id].usd);
  if (!Number.isFinite(price) || price <= 0) throw new Error("INVALID LIVE PRICE RESPONSE");
  return {
    price,
    source: "LIVE",
    lastUpdated: data[id].last_updated_at ? Number(data[id].last_updated_at) * 1000 : Date.now(),
  };
}
async function fetchCoinGeckoHistory(config) {
  const id = config.historyCoingeckoId || config.coingeckoId;
  const url = buildCoinGeckoUrl(`coins/${encodeURIComponent(id)}/market_chart`, {
    vs_currency: "usd",
    days: "365",
  });
  const data = await fetchJsonWithTimeout(url, 10000);
  const historyPoints = (data && data.prices ? data.prices : []).map((point) => ({ timestamp: Number(point[0]), price: Number(point[1]) }))
    .filter((point) => Number.isFinite(point.timestamp) && Number.isFinite(point.price) && point.price > 0);
  if (historyPoints.length < 30) throw new Error("INSUFFICIENT COINGECKO HISTORY");
  return { prices: historyPoints.map((point) => point.price), historyPoints };
}
function saveCache() {
  try {
    localStorage.setItem(`qqq_model_v1_1_live_cache_v2_${state.assetKey}`, JSON.stringify({ price: state.price, priceSource: state.priceSource, lastUpdated: state.lastUpdated, prices: state.prices, historyPoints: state.historyPoints }));
  } catch (_) {}
}
function loadCache(assetKey) {
  try {
    const cacheKeys = [
      `qqq_model_v1_1_live_cache_v2_${assetKey}`,
      `qqq_model_v1_1_cg_cache_${assetKey}`,
    ];
    const raw = cacheKeys.map((key) => localStorage.getItem(key)).find(Boolean);
    if (!raw) return false;
    const cached = JSON.parse(raw);
    if (!cached || !Number.isFinite(cached.price)) return false;
    state.price = cached.price;
    state.priceSource = cached.priceSource || "CACHED";
    state.lastUpdated = cached.lastUpdated || null;
    if (Array.isArray(cached.prices) && cached.prices.length >= 30) state.prices = cleanPrices(cached.prices).slice(-750);
    if (Array.isArray(cached.historyPoints) && cached.historyPoints.length >= 30) state.historyPoints = cached.historyPoints.filter((p) => p && Number.isFinite(p.timestamp) && Number.isFinite(p.price) && p.price > 0).slice(-750);
    refreshIndicators();
    return true;
  } catch (_) { return false; }
}
let refreshInFlight = false;
async function refreshPrice() {
  if (refreshInFlight) return;
  refreshInFlight = true;
  try {
    state.feedStatus = "UPDATING";
    state.warning = "";
    render();

    const config = ASSET_CONFIG[state.assetKey];
    const live = await fetchCoinGeckoPrice(config);

    state.price = live.price;
    state.priceSource = live.source;
    state.feedStatus = "LIVE";
    state.lastUpdated = live.lastUpdated;

    try {
      const history = await fetchCoinGeckoHistory(config);
      state.prices = history.prices.slice(-750);
      state.historyPoints = history.historyPoints.slice(-750);
    } catch (_) {
      state.prices.push(state.price);
      state.prices = cleanPrices(state.prices).slice(-750);
      state.historyPoints.push({ timestamp: Date.now(), price: state.price });
      state.historyPoints = state.historyPoints
        .filter((p) => p && Number.isFinite(p.timestamp) && Number.isFinite(p.price) && p.price > 0)
        .slice(-750);
    }

    refreshIndicators();
    saveCache();
  } catch (err) {
    const usedCache = loadCache(state.assetKey);
    state.feedStatus = usedCache ? "RETRYING" : "FALLBACK";
    state.priceSource = usedCache ? "CACHED LAST PRICE" : "UPLOADED CSV FALLBACK";
    state.warning = "";
    refreshIndicators();
  } finally {
    refreshInFlight = false;
    render();
  }
}

function getNextPivotBarriers(price) {
  const levels = Object.entries(YEARLY_PIVOTS)
    .map(([level, value]) => ({ level, value }))
    .sort((a, b) => a.value - b.value);

  let support = null;
  let resistance = null;
  for (const item of levels) {
    if (item.value < price) support = item;
    if (item.value > price) {
      resistance = item;
      break;
    }
  }
  return { support, resistance };
}
function calcLogReturns(prices, lookback = 504) {
  const clean = cleanPrices(prices).slice(-(lookback + 1));
  const returns = [];
  for (let i = 1; i < clean.length; i++) {
    if (clean[i - 1] > 0 && clean[i] > 0) returns.push(Math.log(clean[i] / clean[i - 1]));
  }
  return returns.filter(Number.isFinite);
}
function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}
function seededRandom(seed) {
  let x = Math.sin(seed) * 10000;
  return function() {
    x = (x * 9301 + 49297) % 233280;
    return x / 233280;
  };
}
function normalRandom(rand) {
  const u1 = Math.max(rand(), 1e-12);
  const u2 = Math.max(rand(), 1e-12);
  return Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
}
function studentTRandom(rand, df = 5) {
  let chiSquare = 0;
  for (let i = 0; i < df; i++) {
    const z = normalRandom(rand);
    chiSquare += z * z;
  }
  return normalRandom(rand) / Math.sqrt(Math.max(chiSquare / df, 1e-12));
}
function calcEwmaVol(returns, lambda = 0.94) {
  if (!returns.length) return 0.02;
  let variance = returns.slice(0, Math.min(20, returns.length)).reduce((sum, r) => sum + r * r, 0) / Math.min(20, returns.length);
  for (const r of returns) {
    variance = lambda * variance + (1 - lambda) * r * r;
  }
  return Math.sqrt(Math.max(variance, 1e-10));
}
function sampleBootstrappedReturn(recentReturns, meanReturn, sampleVol, ewmaVol, dailyDrift, rand) {
  if (!recentReturns.length || !Number.isFinite(sampleVol) || sampleVol <= 0) {
    const tail = studentTRandom(rand, 5) * Math.sqrt(3 / 5);
    return dailyDrift + ewmaVol * tail;
  }

  const useTailShock = rand() < 0.15;
  if (useTailShock) {
    const tail = studentTRandom(rand, 5) * Math.sqrt(3 / 5);
    return dailyDrift + ewmaVol * tail;
  }

  const sampled = recentReturns[Math.floor(rand() * recentReturns.length)];
  const centered = sampled - meanReturn;
  return dailyDrift + centered * (ewmaVol / sampleVol);
}
function estimateIntradayRange(returnShock, ewmaVol, rand) {
  const baseMove = Math.abs(returnShock);
  const rangeShock = Math.abs(studentTRandom(rand, 5)) * Math.sqrt(3 / 5) * ewmaVol;
  return clamp(Math.max(baseMove, rangeShock) * 0.65, ewmaVol * 0.15, ewmaVol * 2.25);
}
function calibrateMonteCarloProbability(probability) {
  const p = clamp(probability, 0.001, 0.999);
  const logit = Math.log(p / (1 - p));
  const calibratedLogit = TRAINED_PIVOT_HIT_MODEL.calibrationIntercept + TRAINED_PIVOT_HIT_MODEL.calibrationSlope * logit;
  return clamp(1 / (1 + Math.exp(-calibratedLogit)), 0.001, 0.999);
}
function remainingTradingDaysToYearEnd() {
  const baseDate = state.lastUpdated ? new Date(state.lastUpdated) : new Date();
  const end = new Date(baseDate.getFullYear(), 11, 31);
  const millis = Math.max(0, end.getTime() - baseDate.getTime());
  const calendarDays = millis / 86400000;
  return clamp(Math.round(calendarDays * 252 / 365.25), 20, 252);
}
function runPivotMonteCarlo(price, support, resistance) {
  if (!support || !resistance || !Number.isFinite(price)) {
    return { resistanceFirst: 0, supportFirst: 0, noTouch: 1, dailyDrift: 0, dailyVol: 0, horizon: 0, rawPairUp: 0.5, calibratedPairUp: 0.5, expectedHitDays: null, expectedResistanceHitDays: null, expectedSupportHitDays: null };
  }

  const returns = calcLogReturns(state.prices, 504);
  const recentReturns = returns.slice(-252);
  const driftWindow = returns.slice(-126);
  const meanReturn = recentReturns.length ? calcMean(recentReturns) : 0;
  const sampleVol = recentReturns.length > 20 ? calcStd(recentReturns, meanReturn) : 0.02;
  let dailyDrift = driftWindow.length ? calcMean(driftWindow) * TRAINED_PIVOT_HIT_MODEL.driftShrink : 0.0002;
  let dailyVol = calcEwmaVol(recentReturns.length ? recentReturns : returns, 0.94);

  dailyDrift = clamp(dailyDrift, -0.0015, 0.0015);
  dailyVol = clamp(dailyVol, 0.008, 0.060);

  const horizon = remainingTradingDaysToYearEnd();
  const paths = TRAINED_PIVOT_HIT_MODEL.paths || 20000;
  const seed = Math.round(price * 100) + Math.round(support.value * 10) + Math.round(resistance.value * 10) + horizon + paths;
  const rand = seededRandom(seed);

  let up = 0;
  let down = 0;
  let none = 0;
  let upHitDaySum = 0;
  let downHitDaySum = 0;

  for (let i = 0; i < paths; i++) {
    let p = price;
    let touched = false;
    for (let t = 0; t < horizon; t++) {
      const open = p;
      const returnShock = sampleBootstrappedReturn(recentReturns, meanReturn, sampleVol, dailyVol, dailyDrift, rand);
      const close = open * Math.exp(returnShock);
      const range = estimateIntradayRange(returnShock, dailyVol, rand);
      const dayHIGH = Math.max(open, close) * Math.exp(range * 0.5);
      const dayLow = Math.min(open, close) * Math.exp(-range * 0.5);
      const hitUp = dayHIGH >= resistance.value;
      const hitDown = dayLow <= support.value;

      if (hitUp && hitDown) {
        const upDistance = Math.abs(Math.log(resistance.value / open));
        const downDistance = Math.abs(Math.log(open / support.value));
        if (upDistance <= downDistance) {
          up++;
          upHitDaySum += t + 1;
        } else {
          down++;
          downHitDaySum += t + 1;
        }
        touched = true;
        break;
      }
      if (hitUp) {
        up++;
        upHitDaySum += t + 1;
        touched = true;
        break;
      }
      if (hitDown) {
        down++;
        downHitDaySum += t + 1;
        touched = true;
        break;
      }
      p = close;
    }
    if (!touched) none++;
  }

  const resolved = up + down;
  const rawPairUp = resolved > 0 ? up / resolved : 0.5;
  const calibratedPairUp = calibrateMonteCarloProbability(rawPairUp);
  const expectedResistanceHitDays = up > 0 ? upHitDaySum / up : null;
  const expectedSupportHitDays = down > 0 ? downHitDaySum / down : null;
  const expectedHitDays = resolved > 0 ? (upHitDaySum + downHitDaySum) / resolved : null;

  return {
    resistanceFirst: up / paths,
    supportFirst: down / paths,
    noTouch: none / paths,
    dailyDrift,
    dailyVol,
    horizon,
    rawPairUp,
    calibratedPairUp,
    expectedHitDays,
    expectedResistanceHitDays,
    expectedSupportHitDays
  };
}
function percent(value) {
  return `${(value * 100).toFixed(1)}%`;
}
function formatExpectedHitTime(days) {
  if (!Number.isFinite(days)) return "NO RESOLVED HIT";
  return `${Math.max(1, Math.round(days))} TRADING DAYS`;
}
function getValidatedEdgeLabel(auc) {
  if (!Number.isFinite(auc)) return "UNVALIDATED";
  if (auc < 0.55) return "NOISE";
  if (auc < 0.60) return "WEAK";
  if (auc < 0.65) return "USEFUL";
  if (auc < 0.70) return "STRONG";
  if (auc < 0.75) return "HIGH";
  return "VERY HIGH";
}
function getPivotHitForecast(price) {
  const barriers = getNextPivotBarriers(price);
  const support = barriers.support;
  const resistance = barriers.resistance;

  if (!support || !resistance) {
    return {
      cards: [
        forecastCard("STATUS", "OUTSIDE TRAINED PIVOT LADDER"),
        forecastCard("MODEL", "AWAIT NEXT ANNUAL PIVOT REFRESH")
      ]
    };
  }

  const mc = runPivotMonteCarlo(price, support, resistance);
  const mcPairUp = mc.rawPairUp;
  const mcPairDown = 1 - mcPairUp;
  const calibratedPairUp = mc.calibratedPairUp;
  const calibratedPairDown = 1 - calibratedPairUp;

  let path = "RANGE / NO CLEAR EDGE";
  if (calibratedPairUp - calibratedPairDown >= 0.10) path = `${resistance.level} FIRST · BULL DOMINANT`;
  if (calibratedPairDown - calibratedPairUp >= 0.10) path = `${support.level} FIRST · BEAR DOMINANT`;
  const expectedHitDays = path.includes("BULL DOMINANT")
    ? mc.expectedResistanceHitDays
    : path.includes("BEAR DOMINANT")
      ? mc.expectedSupportHitDays
      : mc.expectedHitDays;


  return {
    support,
    resistance,
    cards: [
      forecastCard("NEXT YEARLY RESISTANCE", `${resistance.level} $${format(resistance.value)}`),
      forecastCard("NEXT YEARLY SUPPORT", `${support.level} $${format(support.value)}`),
      forecastCard("MONTE CARLO FIRST-HIT", `${resistance.level} ${percent(mcPairUp)} · ${support.level} ${percent(mcPairDown)}`),
      forecastCard("CALIBRATED FORECAST", `${resistance.level} ${percent(calibratedPairUp)} · ${support.level} ${percent(calibratedPairDown)}`),
      forecastCard("NO-HIT PATHS", `${percent(mc.noTouch)} · ${mc.horizon}D HORIZON`),
      forecastCard("PRIMARY PATH", path),
      forecastCard("EXPECTED HIT TIME", formatExpectedHitTime(expectedHitDays)),
      forecastCard("MODEL CONFIDENCE", `${getValidatedEdgeLabel(TRAINED_PIVOT_HIT_MODEL.auc)} · 7D VALIDATED`)
    ]
  };
}

function render() {
  refreshIndicators();
  const zone = getZone(state.price);
  const statState = getStatState(state.zScore, state.percentB);
  const signal = getSignal(state.price, statState);
  const monthlyPivotLevel = Number.isFinite(state.monthlyPivot) ? state.monthlyPivot : YEARLY_PIVOTS.P;

  document.getElementById("feedLabel").textContent = `FEED ${state.feedStatus}${state.lastUpdated ? " " + new Date(state.lastUpdated).toLocaleTimeString() : ""}`;
  document.getElementById("priceSourceBox").textContent = (state.priceSource === "LIVE" || state.priceSource === "COINGECKO" || state.priceSource === "LIVE PRICE FEED") ? "" : String(state.priceSource).toUpperCase();
  const warningBox = document.getElementById("warningBox");
  warningBox.textContent = state.warning || "";
  warningBox.style.display = state.warning ? "block" : "none";

  document.getElementById("priceBox").textContent = `$${format(state.price)}`;
  const regimeBox = document.getElementById("regimeBox");
  regimeBox.textContent = zone;
  regimeBox.className = toneClass(zone);
  const signalBox = document.getElementById("signalBox");
  signalBox.textContent = signal;
  signalBox.className = signalToneClass(signal);
  const stateBox = document.getElementById("stateBox");
  stateBox.textContent = statState;
  stateBox.className = statStateToneClass(statState);
  document.getElementById("monthlyPivotLevelBox").textContent = `$${format(monthlyPivotLevel)}`;
  const monthlyPivotBox = document.getElementById("monthlyPivotBox");
  monthlyPivotBox.textContent = getMonthlyPivotState(state.price);
  monthlyPivotBox.className = monthlyPivotToneClass(state.price);
  document.getElementById("zScoreBox").textContent = state.zScore !== null ? state.zScore.toFixed(2) : "—";
  document.getElementById("percentBBox").textContent = state.percentB !== null ? state.percentB.toFixed(2) : "—";

  const pivotForecast = getPivotHitForecast(state.price);
  document.getElementById("pivotForecastCards").innerHTML = pivotForecast.cards.join("");
  document.getElementById("backtestValidationCards").innerHTML = [
    forecastCard("HISTORICAL HIT-RATE", `AUC ${TRAINED_PIVOT_HIT_MODEL.historicalOnlyAuc.toFixed(3)} · BRIER ${TRAINED_PIVOT_HIT_MODEL.historicalOnlyBrier.toFixed(3)}`),
    forecastCard("MONTE CARLO", `AUC ${TRAINED_PIVOT_HIT_MODEL.monteCarloOnlyAuc.toFixed(3)} · BRIER ${TRAINED_PIVOT_HIT_MODEL.monteCarloOnlyBrier.toFixed(3)}`),
    forecastCard("CALIBRATED MONTE CARLO", `AUC ${TRAINED_PIVOT_HIT_MODEL.auc.toFixed(3)} · BRIER ${TRAINED_PIVOT_HIT_MODEL.brier.toFixed(3)}`),
    forecastCard("ACCURACY", `${(TRAINED_PIVOT_HIT_MODEL.accuracy * 100).toFixed(1)}% @ 0.5 THRESHOLD`),
    forecastCard("CALIBRATION", TRAINED_PIVOT_HIT_MODEL.calibration),
    forecastCard("VOLATILITY", TRAINED_PIVOT_HIT_MODEL.volModel),
    forecastCard("VOLATILITY SHOCKS", TRAINED_PIVOT_HIT_MODEL.shockModel),
    forecastCard("MODEL PRIMARY TEST", "7D VALIDATED · HIGH/LOW FIRST-HIT")
  ].join("");

}

document.querySelectorAll(".asset-btn").forEach((btn) => btn.addEventListener("click", () => refreshPrice()));
loadCache(state.assetKey);
refreshIndicators();
render();

const REFRESH_MS = 120000;
window.setInterval(refreshPrice, REFRESH_MS);
setTimeout(refreshPrice, 500);
window.addEventListener("focus", refreshPrice);
window.addEventListener("online", refreshPrice);
document.addEventListener("visibilitychange", () => {
  if (!document.hidden) refreshPrice();
});
</script>
